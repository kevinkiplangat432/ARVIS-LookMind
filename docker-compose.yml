services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: arvis
      POSTGRES_USER: arvis
      POSTGRES_PASSWORD: arvis
    volumes:
      - arvis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arvis -d arvis"]
      interval: 5s
      timeout: 5s
      retries: 10

  arvis:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - arvis
    restart: unless-stopped

volumes:
  arvis_data: